<!DOCTYPE html>
<html><head><title>Generate EduGame Icons</title>
<style>
body { font-family: 'Segoe UI', sans-serif; padding: 40px; text-align: center; background: #f5f6fa; }
canvas { border: 1px solid #ddd; border-radius: 16px; margin: 10px; }
h1 { color: #2d3436; }
.status { margin-top: 20px; padding: 16px; background: #d4fcdd; border-radius: 12px; color: #00b894; font-weight: bold; display: none; }
.btn { padding: 14px 28px; font-size: 1.1rem; border: none; border-radius: 50px; cursor: pointer; color: #fff; background: linear-gradient(135deg, #a18cd1, #fbc2eb); font-weight: 700; margin-top: 16px; box-shadow: 0 4px 15px rgba(161,140,209,.4); }
.btn:hover { transform: scale(1.05); }
</style>
</head>
<body>
<h1>🌟 Generate EduGame Icons</h1>
<p>Klik tombol di bawah untuk generate dan download icon 192x192 dan 512x512</p>

<canvas id="c512" width="512" height="512"></canvas>
<canvas id="c192" width="192" height="192"></canvas>

<br>
<button class="btn" onclick="downloadIcons()">📥 Download Icons</button>
<div class="status" id="status">✅ Icons berhasil di-download! Simpan ke folder <code>d:\my-app\game-edu\</code></div>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  
  // Background gradient
  const g = ctx.createLinearGradient(0, 0, s, s);
  g.addColorStop(0, '#a18cd1');
  g.addColorStop(0.5, '#fbc2eb');
  g.addColorStop(1, '#ffecd2');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  
  // Inner circle glow
  const cg = ctx.createRadialGradient(s/2, s*0.4, 0, s/2, s*0.4, s*0.35);
  cg.addColorStop(0, 'rgba(255,255,255,0.3)');
  cg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.arc(s/2, s*0.4, s*0.35, 0, Math.PI*2);
  ctx.fill();

  // Star
  const cx = s/2, cy = s*0.35, r = s*0.2;
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = 'rgba(255,215,0,0.6)';
  ctx.shadowBlur = s*0.08;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a = (i*72-90)*Math.PI/180;
    const a2 = ((i*72)+36-90)*Math.PI/180;
    ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    ctx.lineTo(cx+Math.cos(a2)*r*0.42, cy+Math.sin(a2)*r*0.42);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // Book
  const bw = s*0.38, bh = s*0.2, bx = cx-bw/2, by = s*0.58;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = s*0.03;
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.quadraticCurveTo(cx, by+bh*0.15, cx, by+bh);
  ctx.lineTo(bx, by+bh);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#f5f5f5';
  ctx.beginPath();
  ctx.moveTo(bx+bw, by);
  ctx.quadraticCurveTo(cx, by+bh*0.15, cx, by+bh);
  ctx.lineTo(bx+bw, by+bh);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = s*0.004;
  ctx.beginPath();
  ctx.moveTo(cx, by);
  ctx.lineTo(cx, by+bh);
  ctx.stroke();

  // "E" text
  ctx.fillStyle = '#a18cd1';
  ctx.font = `bold ${s*0.14}px Fredoka, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(161,140,209,0.3)';
  ctx.shadowBlur = s*0.02;
  ctx.fillText('E', cx, s*0.88);
  ctx.shadowBlur = 0;

  // Sparkles
  const sparkles = [[0.18,0.2],[0.82,0.15],[0.12,0.6],[0.88,0.55],[0.28,0.88],[0.72,0.85]];
  sparkles.forEach(([sx,sy]) => {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(s*sx, s*sy, s*0.015, 0, Math.PI*2);
    ctx.fill();
    // Small glow
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.arc(s*sx, s*sy, s*0.03, 0, Math.PI*2);
    ctx.fill();
  });
}

drawIcon(document.getElementById('c512'));
drawIcon(document.getElementById('c192'));

function downloadIcons() {
  document.getElementById('c512').toBlob(b => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'icon-512.png';
    a.click();
  });
  setTimeout(() => {
    document.getElementById('c192').toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = 'icon-192.png';
      a.click();
    });
    document.getElementById('status').style.display = 'block';
  }, 500);
}
</script>
</body>
</html>
